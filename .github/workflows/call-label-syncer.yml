name: "Sync labels"

on:
  push:
    paths:
      - '.github/labels.yml'
      - '.github/workflows/call-label-syncer.yml'
    branches:
      - main
jobs:
  build:
    name: Sync labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3.6.0
      - uses: micnncim/action-label-syncer@v1.3.0
        with:
            manifest: .github/labels.yml
            repository: |
                goatcommunity/goat
                goatcommunity/infra
                goatcommunity/goat-accounts
                goatcommunity/ums
            token: ${{ secrets.PAT }}